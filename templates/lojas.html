<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Lojas</title>
</head>
<body>
    <h1>Lista de Lojas</h1>
    <ul>
        {% for loja in lojas %}
            <li>{{ loja.nome }} - {{ loja.endereco }} - {{ loja.telefone }}</li>
        {% endfor %}
    </ul>
    <a href="/cadastrar">Cadastrar nova loja</a>
</body>
</html>
