{% extends 'layout.html' %}

{% block content %}
<h2>Lista de Lojas</h2>
{% if lojas %}
<table>
    <tr>
        <th>Nome</th>
        <th>Endereço</th>
        <th>Telefone</th>
    </tr>
    {% for loja in lojas %}
    <tr>
        <td>{{ loja.nome }}</td>
        <td>{{ loja.endereco }}</td>
        <td>{{ loja.telefone }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Nenhuma loja cadastrada ainda.</p>
{% endif %}
{% endblock %}
