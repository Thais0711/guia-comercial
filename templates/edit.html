{% extends "base.html" %}
{% block content %}
<div class="form-card">
    <h2>Editar Loja</h2>
    <form method="POST">
        <input type="text" name="nome" value="{{ loja.nome }}" required>
        <input type="text" name="endereco" value="{{ loja.endereco }}" required>
        <input type="text" name="telefone" value="{{ loja.telefone }}" required>
        <button type="submit">Salvar Alterações</button>
    </form>
</div>
{% endblock %}
