{% extends "base.html" %}
{% block content %}
<h2>Empresas Cadastradas</h2>

<form method="GET" class="search-form">
    <input type="text" name="search" placeholder="Pesquisar por nome ou cidade..." value="{{ query or '' }}">
    <button type="submit"><i class="fa fa-search"></i> Buscar</button>
</form>

<div class="card-grid">
    {% for loja in lojas %}
    <div class="card">
        <h3>{{ loja.nome }}</h3>
        <p><i class="fa fa-map-marker-alt"></i> {{ loja.endereco }}</p>
        <p><i class="fa fa-phone"></i> {{ loja.telefone }}</p>
        <div class="card-buttons">
            <a class="btn-whatsapp" href="https://api.whatsapp.com/send?phone={{ loja.telefone|replace(' ','') }}&text=Olá {{ loja.nome }}" target="_blank">
                <i class="fa fa-whatsapp"></i> WhatsApp
            </a>
            <a class="btn-edit" href="/editar/{{ loja.id }}"><i class="fa fa-edit"></i> Editar</a>
            <a class="btn-delete" href="/deletar/{{ loja.id }}"><i class="fa fa-trash"></i> Excluir</a>
        </div>
    </div>
    {% else %}
    <p>Nenhuma empresa encontrada.</p>
    {% endfor %}
</div>
{% endblock %}
