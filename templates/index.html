<!DOCTYPE html>
<html>
<head>
    <title>Guia Comercial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <h1>📍 Guia Comercial</h1>
    <nav>
        <a class="btn" href="/">Início</a>
        <a class="btn" href="/add">Cadastrar Empresa</a>
    </nav>
</header>

<div class="container">
    <h2>Lista de Lojas</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Endereço</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        {% for loja in lojas %}
        <tr>
            <td>{{ loja.id }}</td>
            <td>{{ loja.nome }}</td>
            <td>{{ loja.endereco }}</td>
            <td>{{ loja.telefone }}</td>
            <td>
                <a class="btn btn-whatsapp" href="https://wa.me/{{ loja.telefone|replace('+','') }}" target="_blank">WhatsApp</a>
                <a class="btn btn-excluir" href="/deletar/{{ loja.id }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<footer>
    &copy; 2026 Guia Comercial
</footer>
</body>
</html>
