{% extends "base.html" %}

{% block content %}
<h2>Lista de Empresas</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Endereço</th>
        <th>Telefone</th>
        <th>WhatsApp</th>
        <th>Ações</th>
    </tr>
    {% for loja in lojas %}
    <tr {% if loja.premium %}style="background-color:#fff8b3"{% endif %}>
        <td>{{ loja.id }}</td>
        <td>{{ loja.nome }}</td>
        <td>{{ loja.endereco }}</td>
        <td>{{ loja.telefone }}</td>
        <td>
            {% if loja.whatsapp %}
            <a href="https://wa.me/{{ loja.whatsapp }}" target="_blank">Chat</a>
            {% else %}
            -
            {% endif %}
        </td>
        <td>
            <a href="/deletar/{{ loja.id }}">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
