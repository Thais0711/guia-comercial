<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Guia Comercial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>🌸 Guia Comercial</h1>
        <a href="{{ url_for('cadastro') }}" class="btn">Cadastrar Loja</a>
    </header>

    <main>
        {% for loja in lojas %}
        <div class="card">
            <img src="{{ loja.imagem }}" alt="{{ loja.nome }}">
            <h2>{{ loja.nome }}</h2>
            <p>{{ loja.endereco }}</p>
        </div>
        {% endfor %}
    </main>
</body>
</html>
